spring:
  config:
    import: optional:file:./.env[.properties]
  application:
    name: invenpjt-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/invenpjt?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: LoungeMySqlPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: 8080
  servlet:
    session:
      timeout: 7d
      cookie:
        http-only: true
        same-site: lax
